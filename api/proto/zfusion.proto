syntax = "proto3";

package zfusion;

option go_package = "./internal/pkg/zfusionproto/";

message ZFusionRequest {
    string session_id = 1;
}

message ZFusionResponse {
    enum PHASE {
        PHASE_ROI = 0;
        PHASE_FUSION = 1;
    }

    PHASE completion_phase = 1;
    bytes fusion_bitstream = 2;
    string status_message = 3;
}

service FusionCaptureService {
    rpc FusionCapture(ZFusionRequest) returns (stream ZFusionResponse) {}
}
