syntax = "proto3";
package zcoreproto;
option go_package = "./internal/pkg/zcoreproto";

service ZCoreService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Ping(PingRequest) returns (PingResponse);
  rpc Request2FA(TwoFARequest) returns (TwoFAResponse);
}

message RegisterRequest {
  string node_id = 1;
  string node_addr = 2;
}

message RegisterResponse {
  bool success = 1;
  string message = 2;
}

message PingRequest {
  string message = 1;
}

message PingResponse {
  string reply = 1;
}

message TwoFARequest {
  string user_id = 1;
}

message TwoFAResponse {
  bool success = 1;
  string message = 2;
}


service ZNodeController {
  rpc StartEnrollment(EnrollmentRequest) returns (EnrollmentResponse);
}

message EnrollmentRequest {
  string user_id = 1;
}

message EnrollmentResponse {
  bool accepted = 1;
  string message = 2;
}
